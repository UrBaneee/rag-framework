# Parser routing configuration
# Maps detected_type (from CompositeSniffer) to an ordered list of parser names.
# The orchestrator tries candidates in order and uses the first successful result.
# Add more candidates per type for fallback chains.

ocr:
  # Set to false to disable OCR fallback entirely (e.g. in environments
  # where PaddleOCR is not installed).
  enabled: true
  # PDFs with fewer extracted characters than this are considered "scanned"
  # and will trigger OCR fallback after the primary text parser runs.
  min_chars_threshold: 100

routes:
  pdf:
    # pymupdf is tried first; if it produces too few chars (scanned PDF),
    # the orchestrator falls back to pdf_ocr when ocr.enabled is true.
    candidates: [pymupdf, pdf_ocr]

  html:
    candidates: [trafilatura]

  txt:
    candidates: [md_parser]

  markdown:
    candidates: [md_parser]

  docx:
    candidates: [docx_parser]

  xlsx:
    candidates: [xlsx_parser]

  # Unsupported types — empty candidate list triggers explicit unsupported result
  unsupported:
    candidates: []

  # Unknown types — no candidates, will return unsupported_format
  unknown:
    candidates: []
