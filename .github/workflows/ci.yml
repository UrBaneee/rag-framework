name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install python-docx openpyxl  # optional parsers used in tests

      - name: Run unit & integration tests
        env:
          # Provide a dummy key so any import-time validation passes.
          # Tests that actually call the OpenAI API are skipped via markers.
          OPENAI_API_KEY: sk-test-placeholder
          VOYAGE_API_KEY: pa-test-placeholder
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: |
          pytest tests/ \
            --ignore=tests/e2e \
            -m "not e2e" \
            -q \
            --tb=short

      - name: Run e2e smoke test
        env:
          OPENAI_API_KEY: sk-test-placeholder
          VOYAGE_API_KEY: pa-test-placeholder
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: |
          pytest tests/e2e/ -q --tb=short

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: rag-framework:ci
