services:
  studio:
    build:
      context: .
      target: runtime
    image: rag-framework:latest
    container_name: rag-studio
    ports:
      - "8501:8501"
    volumes:
      # Persist the SQLite database and FAISS indexes across restarts
      - rag-data:/app/data
      # Mount local documents folder for easy ingestion
      - ./docs:/app/docs:ro
    env_file:
      - .env
    environment:
      RAG_DATA_DIR: /app/data
      KMP_DUPLICATE_LIB_OK: "TRUE"   # suppress OpenMP conflict on some hosts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mcp:
    build:
      context: .
      target: runtime
    image: rag-framework:latest
    container_name: rag-mcp
    command:
      - python
      - -m
      - rag.app.mcp_server.server
    ports:
      - "8000:8000"
    volumes:
      - rag-data:/app/data
    env_file:
      - .env
    environment:
      RAG_DATA_DIR: /app/data
      KMP_DUPLICATE_LIB_OK: "TRUE"
    restart: unless-stopped
    depends_on:
      studio:
        condition: service_healthy

volumes:
  rag-data:
    driver: local
