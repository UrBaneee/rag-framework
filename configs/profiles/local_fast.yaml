# Profile: local_fast
# Optimised for low latency on local development machines.
# Trades retrieval quality for speed: smaller candidate pools,
# reranking disabled, cheaper/faster LLM.

retrieval:
  bm25_top_k: 10
  vector_top_k: 10
  fusion_pool_size: 20
  rerank_top_k: 5

reranking:
  enabled: false

generation:
  context_top_k: 2
  token_budget: 1500
  llm_model: gpt-4o-mini

ingestion:
  chunk_max_tokens: 300
  chunk_overlap_tokens: 30
